<!DOCTYPE html>
<html lang="en">

<head>
    <title>Add Checkin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="./lib/leaflet/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 400px;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #ccc;
        }

        .right {
            flex: 1;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: bold;
        }

        input, textarea, button, select {
            padding: 8px;
            font-size: 16px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            cursor: pointer;
        }

        #result {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left">
            <h1>Check In</h1>

            <form method="post" id="checkinForm">
                <label for="note">Note</label>
                <textarea id="note" name="note"></textarea>

                <label for="latitude">Latitude</label>
                <input type="text" id="latitude" name="latitude">

                <label for="longitude">Longitude</label>
                <input type="text" id="longitude" name="longitude">

                <label for="datetime">Timestamp</label>
                <input type="datetime-local" id="datetime" name="datetime">

                <label for="timezone">Timezone</label>
                <select id="timezone" name="timezone"></select>

                <label for="apikey">API Key</label>
                <input type="text" id="apiKey" name="apikey">

                <button type="submit">Submit</button>
            </form>

            <p id="result"></p>
        </div>

        <div class="right">
            <div id="map"></div>
        </div>
    </div>

    <script src="./lib/leaflet/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Centre on London
        let startLat = 51.51213573156569
        let startLong = -0.1823298235597972

        const map = L.map('map').setView([startLat, startLong], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
            .addTo(map);

        let marker = L.marker([startLat, startLong]).addTo(map);

        function updateMap() {
            const lat = parseFloat(document.getElementById("latitude").value);
            const lng = parseFloat(document.getElementById("longitude").value);

            if (!isNaN(lat) && !isNaN(lng)) {
                const newLatLng = [lat, lng];

                marker.setLatLng(newLatLng);
                map.setView(newLatLng, 13);
            }
        }

        document.getElementById("latitude").addEventListener("input", updateMap);
        document.getElementById("longitude").addEventListener("input", updateMap);

        document.getElementById("checkinForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const apiKey = document.getElementById("apiKey").value;

            const payload = {
                note: document.getElementById("note").value,
                long: document.getElementById("longitude").value,
                lat: document.getElementById("latitude").value,
                dateTime: document.getElementById("datetime").value,
                timeZone: document.getElementById("timezone").value,
            };

            try {
                const response = await fetch("/checkin?apiKey=" + encodeURIComponent(apiKey), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload),
                });

                const text = await response.text();
                document.getElementById("result").textContent =
                    "Status: " + response.status + "\n\n" + text;

            } catch (error) {
                document.getElementById("result").textContent = error.toString();
            }
        });

        const select = document.getElementById("timezone");
        const timezones = Intl.supportedValuesOf('timeZone');

        timezones.forEach(tz => {
            const option = document.createElement("option");
            option.value = tz;
            option.textContent = tz;
            select.appendChild(option);
        });

        select.value = Intl.DateTimeFormat().resolvedOptions().timeZone;
    </script>
</body>

</html>
