<!DOCTYPE html>
<html lang="en">

<head>
    <title>Add Checkin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="./lib/leaflet/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 400px;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #ccc;
        }

        .right {
            flex: 1;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: bold;
        }

        input, textarea, button, select {
            padding: 8px;
            font-size: 16px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            cursor: pointer;
        }

        #result {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left">
            <h1>Check In</h1>

            <form method="post" id="checkinForm">
                <label for="note">Note</label>
                <textarea id="note" name="note"></textarea>

                <label for="latitude">Latitude</label>
                <input type="text" id="latitude" name="latitude">

                <label for="longitude">Longitude</label>
                <input type="text" id="longitude" name="longitude">

                <label for="datetime">Timestamp</label>
                <input type="datetime-local" step="1" id="datetime" name="datetime">

                <label for="timezoneInput">Timezone</label>
                <input id="timezoneInput" name="timezone" list="timezoneList" />
                <datalist id="timezoneList"></datalist>

                <label for="apikey">API Key</label>
                <input type="text" id="apiKey" name="apikey">

                <button type="submit">Submit</button>
            </form>

            <p id="result"></p>
        </div>

        <div class="right">
            <div id="map"></div>
        </div>
    </div>

    <script src="./lib/leaflet/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./dist/helpers.js"></script>
    <script src="./dist/add.js"></script>
</body>

</html>
